#ddev-generated
# Hooks for the Playwright add-on.
#
# The pre-start hook runs on the HOST *before* DDEV renders docker-compose, which
# is the only moment PLAYWRIGHT_DOCKER_IMAGE can be set so the interpolation picks
# up the version from .ddev/playwright/playwright.yaml. Doing this in post-start
# would apply the image only on the *next* start (stale image bug).
#
# Everything is guarded so an empty or misconfigured project never breaks
# `ddev start`.
hooks:
  pre-start:
    - exec-host: |
        set -u
        SCRIPT="${DDEV_APPROOT}/.ddev/playwright/bin/resolve-config.sh"
        if [ -f "${SCRIPT}" ]; then
          bash "${SCRIPT}" || {
            echo "playwright: config resolution failed, falling back to :latest" >&2
            printf 'PLAYWRIGHT_DOCKER_IMAGE=mcr.microsoft.com/playwright:latest\nPLAYWRIGHT_VERSION=latest\n' \
              > "${DDEV_APPROOT}/.ddev/.env.playwright"
          }
        fi
  post-start:
    # Non-fatal version-drift warning in the playwright container. `exec` and
    # `service` are sibling keys (DDEV hook syntax). Guarded so it never fails
    # the start.
    - exec: 'sh -lc ''expected=$(sed -n "s/^PLAYWRIGHT_VERSION=//p" /mnt/ddev_config/.env.playwright 2>/dev/null | head -n1); if [ -n "$expected" ] && [ "$expected" != "latest" ]; then actual=$(npx --no-install playwright --version 2>/dev/null | sed "s/^Version //"); if [ -n "$actual" ] && [ "$actual" != "$expected" ]; then echo "playwright: warning - version drift (@playwright/test=$actual, expected $expected). Run: ddev playwright install" >&2; fi; fi; true'''
      service: playwright
