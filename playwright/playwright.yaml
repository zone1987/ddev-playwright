#ddev-generated
# Playwright add-on configuration.
#
# This file is safe to edit. Remove the "#ddev-generated" line above to prevent
# DDEV from overwriting it on add-on updates.
#
# Every key is optional. Missing keys fall back to the shipped defaults
# (see defaults.yaml), so a file containing only `playwright.version` still
# inherits the default searchPaths, testDirectory, etc.
version: 1

playwright:
  # Playwright version to use. It drives BOTH the Docker image tag
  # (mcr.microsoft.com/playwright:v<version>-noble) and the installed
  # @playwright/test npm package. Omit or leave empty to use "latest".
  version: "1.56.1"

  # Directories (relative to the project root) that are scanned for Playwright
  # instances. Any subdirectory containing <testDirectory> with *.spec.ts or
  # *.spec.js files is treated as an instance.
  #
  # Empty by default — nothing is scanned until you add paths here. Uncomment the
  # examples that fit your project (or add your own):
  searchPaths: []
  #  - custom/static-plugins
  #  - custom/plugins
  #  - vendor
  #  - packages
  #  - extensions
  #  - modules

  # Where a per-instance config lives, relative to an instance directory.
  # NOTE: browsers are configured the normal Playwright way — via the `projects`
  # in each instance's playwright.config (chromium/firefox/webkit=Safari/chrome are
  # all available in the image). Instances without their own config default to
  # Google Chrome. There is intentionally no browser key here.
  instanceConfig: tests/playwright.config.ts

  # Where the spec files live, relative to an instance directory.
  testDirectory: tests/e2e

  # How instance configs are merged onto the global config. "deep" performs a
  # recursive object merge (arrays are replaced).
  mergeStrategy: deep

  # Extra npm packages to install alongside @playwright/test on
  # `ddev playwright install` (e.g. helpers, reporters, custom fixtures). A version
  # range is allowed per npm syntax. @axe-core/playwright for accessibility testing
  # is always installed automatically, so you don't need to list it here.
  packages: []
  #  - "@axe-core/playwright"
  #  - "dotenv@^16"

  # --- Shopware (optional) ------------------------------------------------------
  # Shopware projects get the @shopware-ag/acceptance-test-suite installed and the
  # SHOPWARE_* / APP_URL variables forwarded from your project .env automatically.
  # Variable names & suite per the official Shopware guide:
  #   https://developer.shopware.com/docs/guides/development/testing/e2e-playwright/install-configure.html
  #
  # Detection is automatic (a composer.json requiring shopware/core in the project
  # root, the DDEV docroot, or a common subfolder). Override if needed:
  #   shopware: auto   # auto (default) | true (force on) | false (force off)
  # shopware: auto
  #
  # If Shopware lives in an unusual subfolder that auto-detection misses, point at
  # it explicitly (relative to the project root). Its composer.json/.env are used.
  # shopwareRoot: apps/shop

  # --- WordPress (optional) -----------------------------------------------------
  # WordPress projects get @wordpress/e2e-test-utils-playwright installed and the
  # WP_BASE_URL / WP_USERNAME / WP_PASSWORD variables forwarded automatically. Tests
  # run against the running DDEV site (not wp-env). WP_BASE_URL defaults to the
  # primary DDEV URL; credentials default to admin / password (DDEV's WP admin).
  # Variable names & utils per the official WordPress guide:
  #   https://developer.wordpress.org/news/2026/05/getting-started-writing-wordpress-e2e-tests-with-playwright/
  #
  # Detection is automatic (wp-load.php / wp-includes, or DDEV type: wordpress).
  # Override if needed:
  #   wordpress: auto   # auto (default) | true (force on) | false (force off)
  # wordpress: auto
  #
  # If WordPress lives in an unusual subfolder that auto-detection misses:
  # wordpressRoot: web/wp
