name: playwright

project_files:
  - docker-compose.playwright.yaml
  - commands/host/playwright

ddev_version_constraint: '>= v1.24.10'

post_install_actions:
  - |
    #ddev-description:Show next steps
    echo "Playwright add-on installed (bare container)."
    echo "1. (Optional) pin a version: set PLAYWRIGHT_IMAGE_TAG in .ddev/.env"
    echo "   (e.g. 'ddev dotenv set .ddev/.env --playwright-image-tag v1.57.0-noble'), then 'ddev restart'."
    echo "2. Install Playwright yourself in your project (e.g. npm i -D @playwright/test) and add a playwright.config."
    echo "3. Run tests with 'ddev playwright test', open the UI with 'ddev playwright --ui',"
    echo "   or pass any Playwright CLI args through: 'ddev playwright <args>'."
