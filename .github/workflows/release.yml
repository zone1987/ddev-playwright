name: release

# Release gating: when a version tag is pushed, run the FULL add-on test suite
# (both DDEV stable and HEAD) and only publish the GitHub release if every job is
# green. If any test fails, no release is created.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # 1) Run the bats suite against a matrix of DDEV versions. This is the gate.
  #    The @release test is skipped here: it installs the latest GitHub release,
  #    which doesn't exist yet at this point (the release job runs afterwards).
  #    The @release test runs in the regular tests.yml instead.
  test:
    strategy:
      matrix:
        ddev_version: [stable, HEAD]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: ddev/github-action-add-on-test@v2
        with:
          ddev_version: ${{ matrix.ddev_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          addon_repository: ${{ github.repository }}
          addon_ref: ${{ github.ref_name }}
          test_command: "bats tests --filter-tags '!release'"

  # 2) Only runs if ALL matrix test jobs succeeded. Creates the GitHub release.
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      # v5+ run on Node.js 24 (v4 targets the deprecated Node.js 20 runtime).
      - uses: actions/checkout@v5

      - name: Create GitHub release
        # v3 runs on Node.js 24 (v2 targets the deprecated Node.js 20 runtime).
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
