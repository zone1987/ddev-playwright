name: release

# Publishes a GitHub release when a version tag is pushed. Tests are NOT re-run
# here — they already ran on the pull request that introduced the change (see
# tests.yml). Keep the two in sync: only tag main after its PR checks were green.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
